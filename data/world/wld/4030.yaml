name: "Кузня"

description: |
  Просторная, выстроенная из вековых дубовых комлей изба. В одном углу,
  поблизости от прорубленного в стене окна, стоит мех и наковальня. Возле 
  двери - лавка, чуть подале - бадейка сорокапудовая, наполненная на три 
  четверти водой - в нее окунает кузнец выкованную вещицу. На земле, возле
  наковальни, рассыпаны уголь и куски камня железчатого.

