name: "Кабак"

description: |
  ___Красна изба углами, а хозяйка - пирогами. Правду молвит народ - хороша
  хозяйка, красна да ласкоречива, а от пирожного духа ажно слюнки текут.
  А окромя пирогов, на огромной, дубовой лавке стоят клети с караваями
  румяными, да с шанежками и кренделями пышными. А у стены - бочки многоведерные
  с медом хмельным да винами зелеными. Веселись, душа русская, веселись, да
  меру знай.

