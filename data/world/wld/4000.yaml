name: "Поречная улица"

description: |
     Поначалу, все городище стояло вдоль покатистого берега реки - и вода
  поблизости, и обороняться от ворога - оно сподручней. Народишко все 
  прибывал и прибывал, расселяясь все дальше и дальше в целинной степи, 
  появлялись новые улицы и проулки, но эта так и осталась - самой старой, 
  да самой тихой и погожей улицей в растущем городе. На севере слышен скрип 
  мельничного колеса. Рядом видна решетка, закрывающая спуск куда-то, сверху
  закрытая массивным замком.

