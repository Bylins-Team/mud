name: "Лавка скупщика"

description: |
  ___Просторная изба одного из местных охотников, превращенная по случаю прибытия
  купца в лавку. Здесь купец скупает шкуры - и дешевую бурую медведину, и рыжие беличьи
  шкурки, и блестящие, легкие как пух и в немалую цену весом связки норковых шкур.
  Выходя отсюда, охотники - кто пересчитывает выручку, радостно посвистывая и прикидывая,
  сколько монет оставить нынче в кабаке, а сколько отложить на обзаведение, а кто и сумрачно
  ворчит в бороду.

