name: "Большая яма"

description: |
     Большая яма, вырытая в глиняном пласту и выложенная снизу тесом окружает
  вас. Выбраться отсюда невозможно, а если добавить к этому решетку, закрывающую
  единственный лаз из ямы, то начинаешь понимать что отсюда могут только
  выпустить. Похоже это местная темница. Вверху, за решеткой, вы видите вашего стража,
  который сильно ругается, припоминает всех ваших родственников до десятого колена.
  Вы поникли духом, и хныкая, хотите просить прощения: "Простите меня дурака".

