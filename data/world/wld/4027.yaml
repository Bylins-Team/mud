name: "Лихой закоулок"

description: |
     Здесь с давних пор селились лихие людишки да голытьба, не привыкшие ни к
  труду земному, ни к мастеровому. Порой они собираются в лихие ватаги и
  выходят на большую дорогу, порою, ночной порой, поджидают припозднившихся
  путников поодиночке, уповая на кистень да воровской фарт. А наутро начинают
  похваляться в кабаках перед своими дружками богатой добычей да загубленными
  невинными жизнями. На юге проходит Бабичья улица.

