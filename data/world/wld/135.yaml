description: |
  ___Вы оказались в странном месте, заполненом туманом и серыми тенями, окружающими
  вас со всех сторон, извивающимися в медленном танце и тающих в темноте, одна за другой.
  Отовсюду слышатся шорохи и стук падающих капель, серые тени, только что казавшиеся
  бесплотными призраками, вдруг обретают форму и цвет, представая жуткими чудовищами, или 
  бастионами громадного, тонущего во мгле замка, но налетающий порыв ветра вновь заставляет
  наваждение расплыться клубами густого тумана и мириадами миражей.&n

