# Room #4031
vnum: 4031
zone: 40

name: "Лавка скорняка"

description: |
     Полутемная изба, воздух в которой пропитан духом лесного зверья. Везде,
  на стенах на полатях, на столешнице лежат шкуры животных, как свойских,
  так и заморских. А чуть подале, у окна, затянутого бычьим пузырем, красуются
  уже готовые платья - хрущатые кафтаны, армяки, зипуны, рубахи. Развязывай
  мошну - да носи на загляденье честному народу.

