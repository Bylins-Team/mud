descriptions:
  short: "Величественный морской дракон свернулся кольцом вокруг подножия трона."
  long: |
    Гигантский зверь поднял свой увенчаную короной голову, чтобы взглянуть
    на осмелившихся потревожить его покой. Изумрудно-зеленые его глаза заглядывают
    на самое дно вашей души - впрочем, вы больше поглощены зрелищем величественного
    дракона - должно быть царя и прародителя всех морских драконов. Его чещуя переливается
    всеми оттенками красного - от нежно розовых проблесков утренней зари и искр пурпура,
    до тяжелого грозного багрянца, подобного пролитой крови.

